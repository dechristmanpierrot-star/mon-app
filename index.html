<!DOCTYPE html>
<html>
<head>
  <title>Pronostics Foot</title>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    .vip {
      color:gold;
      font-weight:bold;
    }

    button {
      width:100%;
      padding:12px;
      background:#22c55e;
      border:none;
      border-radius:5px;
      color:white;
    }
  </style>
</head>

<body>

<h2>⚽ Pronostics du jour</h2>

<div id="app"></div>

<button onclick="load()">Actualiser</button>

<script>

const matches = [
  {home:"Real Madrid", away:"Barcelona"},
  {home:"Man City", away:"Liverpool"},
  {home:"PSG", away:"Marseille"},
  {home:"Bayern", away:"Dortmund"}
];

function predict() {
  let r = Math.random();
  if (r < 0.5) return "Victoire domicile";
  if (r < 0.8) return "Plus de 2.5 buts";
  return "BTTS (les 2 équipes marquent)";
}

function load() {
  let html = "";

  matches.forEach(m => {
    html += `
      <div class="card">
        <b>${m.home} vs ${m.away}</b>
        <p>🔮 ${predict()}</p>
        <p class="vip">🔒 VIP: Score exact disponible</p>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

load();

</script>

</body>
</html>
