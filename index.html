<!DOCTYPE html>
<html>
<head>
  <title>Live Pronostics</title>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:10px;
    }

    .live {
      color:red;
      font-weight:bold;
    }

    .green { color:#22c55e; }
  </style>
</head>

<body>

<h2>⚽ Pronostics en direct</h2>

<div id="app"></div>

<script>

const matches = [
  {home:"Real Madrid", away:"Barcelona"},
  {home:"Man City", away:"Liverpool"},
  {home:"PSG", away:"Marseille"},
  {home:"Bayern", away:"Dortmund"}
];

// 🤖 PRONOSTIC
function predict(home, away) {
  let r = Math.random();

  if (r < 0.4) return home + " gagne";
  if (r < 0.8) return away + " gagne";
  return "Match nul";
}

// ⏱️ TEMPS LIVE
function getMinute() {
  return Math.floor(Math.random()*90) + "'";
}

// ⚽ SCORE LIVE
function getScore() {
  return Math.floor(Math.random()*3) + " - " + Math.floor(Math.random()*3);
}

// 🔄 AFFICHAGE
function render() {
  const container = document.getElementById("app");
  container.innerHTML = "";

  matches.forEach(match => {
    container.innerHTML += `
      <div class="card">
        <div class="live">🔴 LIVE ${getMinute()}</div>
        <b>${match.home} vs ${match.away}</b>
        <p>Score: ${getScore()}</p>
        <p class="green">Pronostic: ${predict(match.home, match.away)}</p>
      </div>
    `;
  });
}

// 🔁 UPDATE AUTO (temps réel)
setInterval(render, 5000);

render();

</script>

</body>
</html>
