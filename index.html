<!DOCTYPE html>
<html>
<head>
  <title>Pronostics Foot</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>⚽ Pronostics simples</h1>

<div id="matches"></div>

<button onclick="loadMatches()">Actualiser</button>

<script>

// 📊 Données simples (FIABLE)
const matches = [
  {home: "Real Madrid", away: "Mallorca"},
  {home: "Manchester City", away: "Liverpool"},
  {home: "Arsenal", away: "Chelsea"},
  {home: "Barcelona", away: "Atletico Madrid"},
  {home: "Bayern Munich", away: "Dortmund"}
];

// 🔥 Fonction pronostic simple
function getPrediction(home, away) {

  const strongTeams = [
    "Real Madrid",
    "Manchester City",
    "Bayern Munich",
    "Barcelona"
  ];

  if (strongTeams.includes(home)) {
    return "Victoire " + home;
  }

  if (strongTeams.includes(away)) {
    return "Victoire " + away;
  }

  return "Match serré (1X)";
}

// 🎯 Affichage
function loadMatches() {

  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(match => {

    const prediction = getPrediction(match.home, match.away);

    container.innerHTML += `
      <div class="card">
        <p><b>${match.home} vs ${match.away}</b></p>
        <p>🔥 Pronostic : ${prediction}</p>
      </div>
    `;
  });

}

// lancer automatiquement
loadMatches();

</script>

</body>
</html>
