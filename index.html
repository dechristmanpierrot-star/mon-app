<!DOCTYPE html>
<html>
<head>
  <title>Score Live</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 8px 15px;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>⚽ Scores en direct</h1>

<div class="card">
  <p id="match1">Chargement...</p>
</div>

<button onclick="getLiveScores()">Actualiser les scores</button>

<script>
async function getLiveScores() {

  const response = await fetch("https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all", {
    method: "GET",
    headers: {
      "X-RapidAPI-Key": 86d28acd4fmshc8881e32e11611dp1669fejsn57e242106740,
      "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
    }
  });

  const data = await response.json();

  if (data.response.length > 0) {
    let match = data.response[0];

    document.getElementById("match1").innerText =
      match.teams.home.name + " vs " +
      match.teams.away.name + " : " +
      match.goals.home + " - " +
      match.goals.away;
  } else {
    document.getElementById("match1").innerText = "Aucun match en direct";
  }

}
</script>

</body>
</html>
