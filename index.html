<!DOCTYPE html>
<html>
<head>
  <title>Pronostics Live</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 5px;
      width: 100%;
    }
  </style>
</head>

<body>

<h1>⚽ Pronostics Live</h1>

<div id="matches"></div>

<button onclick="loadMatches()">Actualiser</button>

<script>

// 🔥 FAKE API GRATUITE (qui marche toujours)
const matches = [
  {home: "Real Madrid", away: "Barcelona"},
  {home: "Manchester City", away: "Liverpool"},
  {home: "PSG", away: "Marseille"},
  {home: "Bayern", away: "Dortmund"}
];

// 🤖 IA SIMPLE (PRONOSTIC)
function predict(home, away) {
  let r = Math.random();

  if (r < 0.33) return home + " gagne";
  if (r < 0.66) return away + " gagne";
  return "Match nul";
}

// 📊 AFFICHAGE
function loadMatches() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(match => {
    const pronostic = predict(match.home, match.away);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${match.home} vs ${match.away}</b><br><br>
      🔮 Pronostic: <span style="color:#22c55e">${pronostic}</span>
    `;

    container.appendChild(div);
  });
}

// AUTO LOAD
loadMatches();

</script>

</body>
</html>
