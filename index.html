<!DOCTYPE html>
<html>
<head>
  <title>Mon App Score</title>
</head>
<body>

<h1>⚽ Scores des matchs</h1>

<div>
  <p id="match1">Feyenoord vs Ajax : 0 - 0</p>
  <button onclick="score1()">Changer</button>
</div>

<br>

<div>
  <p id="match2">Lyon vs Marseille : 0 - 0</p>
  <button onclick="score2()">Changer</button>
</div>

<script>
function score1() {
  document.getElementById("match1").innerText = "Feyenoord vs Ajax : 1 - 0";
}

function score2() {
  document.getElementById("match2").innerText = "Lyon vs Marseille : 2 - 1";
}
</script>

</body>
</html>
