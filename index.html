<!DOCTYPE html>
<html>
<head>
  <title>Score Live</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 8px 15px;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>⚽ Scores en direct</h1>

<div class="card">
  <p id="match1">Feyenoord vs Ajax : 0 - 0</p>
  <button onclick="score1()">Update</button>
</div>

<div class="card">
  <p id="match2">Lyon vs Marseille : 0 - 0</p>
  <button onclick="score2()">Update</button>
</div>

<script>
function score1() {
  document.getElementById("match1").innerText = "Feyenoord vs Ajax : 1 - 0";
}

function score2() {
  document.getElementById("match2").innerText = "Lyon vs Marseille : 2 - 1";
}
</script>

</body>
</html>
