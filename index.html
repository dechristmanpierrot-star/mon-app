<!DOCTYPE html>
<html>
<head>
  <title>Score Live</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 15px;
      color: white;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>⚽ Scores récents</h1>

<div id="matches"></div>

<button onclick="getMatches()">Actualiser</button>

<script>
async function getMatches() {

  document.getElementById("matches").innerHTML = "Chargement...";

  const response = await fetch("https://www.scorebat.com/video-api/v3/");
  const data = await response.json();

  let html = "";

  data.response.slice(0,5).forEach(match => {
   html += `
  <div class="card">
    <p><strong>${match.title}</strong></p>
    <p>Compétition: ${match.competition}</p>
    const date = new Date(match.date);

html += `
  <div class="card">
    <p><strong>${match.title}</strong></p>
    <p>Compétition: ${match.competition}</p>
    <p>Heure: ${date.toLocaleString()}</p>
  </div>
`;
  </div>
`; 
  });

  document.getElementById("matches").innerHTML = html;
}
</script>

</body>
</html>
