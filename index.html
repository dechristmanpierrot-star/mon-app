<script>
async function getLiveScores() {

  document.getElementById("match1").innerText = "Chargement...";
  document.getElementById("match2").innerText = "Chargement...";

  try {
    const response = await fetch("https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all", {
      method: "GET",
      headers: {
        "X-RapidAPI-Key": 86d28acd4fmshc8881e32e11611dp1669fejsn57e242106740,
        "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
      }
    });

    const data = await response.json();

    if (data.response.length > 0) {

      let match1 = data.response[0];
      let match2 = data.response[1];

      document.getElementById("match1").innerText =
        match1.teams.home.name + " vs " +
        match1.teams.away.name + " : " +
        match1.goals.home + " - " +
        match1.goals.away;

      if (match2) {
        document.getElementById("match2").innerText =
          match2.teams.home.name + " vs " +
          match2.teams.away.name + " : " +
          match2.goals.home + " - " +
          match2.goals.away;
      }

    } else {
      document.getElementById("match1").innerText = "Aucun match en direct";
      document.getElementById("match2").innerText = "";
    }

  } catch (error) {
    document.getElementById("match1").innerText = "Erreur API";
    document.getElementById("match2").innerText = "";
  }
}
</script>
